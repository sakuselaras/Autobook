<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Book Pro - Studio Penulis AI</title>
    <!-- Framework & UI Library -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .book-content { font-family: 'Merriweather', serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #9ca3af; border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Markdown Styling */
        .prose h1 { font-size: 2.25rem; font-weight: 800; margin-bottom: 1.5rem; color: #111827; }
        .prose h2 { font-size: 1.875rem; font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; color: #1f2937; border-bottom: 2px solid #e5e7eb; padding-bottom: 0.5rem; }
        .prose h3 { font-size: 1.5rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #374151; }
        .prose p { margin-bottom: 1.25rem; line-height: 1.8; color: #4b5563; text-align: justify; }
        .prose ul, .prose ol { margin-bottom: 1.25rem; padding-left: 1.5rem; }
        .prose ul { list-style-type: disc; }
        .prose ol { list-style-type: decimal; }
        .prose li { margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- KONFIGURASI SUPABASE ---
        const SUPABASE_URL = "https://pgefqhpomzjbqbqobkta.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_YO3yI5L3PSXl2X9VXhwRcQ_OID1tZdo"; 

        function App() {
            const [client, setClient] = useState(null);
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState({ tokens: 0 });
            const [voucherCode, setVoucherCode] = useState('');
            
            // Auth States
            const [authEmail, setAuthEmail] = useState('');
            const [authPassword, setAuthPassword] = useState('');
            const [isRegistering, setIsRegistering] = useState(false);
            const [authLoading, setAuthLoading] = useState(false);

            // Form States
            const [topic, setTopic] = useState('');
            const [audience, setAudience] = useState('Pemula / Umum');
            const [tone, setTone] = useState('Informatif & Santai');
            const [aiEngine, setAiEngine] = useState('gemini'); 
            
            // AI States
            const [generatedContent, setGeneratedContent] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [loadingText, setLoadingText] = useState('');
            const resultRef = useRef(null);

            // 1. Init Supabase
            useEffect(() => {
                if (window.supabase) {
                    setClient(window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY));
                }
            }, []);

            // 2. Auth Listener
            useEffect(() => {
                if (!client) return;
                client.auth.getSession().then(({ data }) => setUser(data?.session?.user ?? null));
                const { data: { subscription } } = client.auth.onAuthStateChange((_event, session) => {
                    setUser(session?.user ?? null);
                });
                return () => subscription?.unsubscribe();
            }, [client]);

            // 3. Profile Loader
            const fetchUserData = useCallback(async () => {
                if (!client || !user) return;
                try {
                    const { data: prof } = await client.from('profiles').select('*').eq('id', user.id).single();
                    if (prof) setProfile(prof);
                    else {
                        const { data: newProf } = await client.from('profiles').upsert([{ id: user.id, email: user.email, tokens: 200 }]).select().single();
                        if (newProf) setProfile(newProf);
                    }
                } catch (err) { console.error(err); }
            }, [client, user]);

            useEffect(() => { fetchUserData(); }, [fetchUserData]);

            // 4. Handle Auth
            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthLoading(true);
                try {
                    if (isRegistering) {
                        const { error } = await client.auth.signUp({ email: authEmail, password: authPassword });
                        if (error) throw error;
                        alert("Pendaftaran berhasil! Silakan periksa email atau langsung login.");
                    } else {
                        const { error } = await client.auth.signInWithPassword({ email: authEmail, password: authPassword });
                        if (error) throw error;
                    }
                } catch (err) { alert("Auth Error: " + err.message); }
                setAuthLoading(false);
            };

            // 5. Claim Voucher
            const handleRedeem = async () => {
                if (!client || !voucherCode) return;
                const code = voucherCode.trim().toUpperCase();
                try {
                    const { data: v, error } = await client.from('vouchers').select('*').eq('code', code).single();
                    if (error || !v) return alert("Kode voucher tidak ditemukan!");
                    if (v.usage_count >= v.max_usage) return alert("Kuota voucher sudah habis!");
                    
                    const newTokens = (profile.tokens || 0) + v.amount;
                    await client.from('profiles').update({ tokens: newTokens }).eq('id', user.id);
                    await client.from('vouchers').update({ usage_count: v.usage_count + 1 }).eq('code', code);
                    setProfile(prev => ({ ...prev, tokens: newTokens }));
                    setVoucherCode('');
                    alert(`Selamat! +${v.amount} Token berhasil ditambahkan.`);
                } catch (err) { alert("Gagal klaim voucher."); }
            };

            // 6. Call AI Backend (Render)
            const callAI = async (type, cost) => {
                if (!topic) return alert("Masukkan topik buku Anda!");
                if ((profile.tokens || 0) < cost) return alert("Token tidak cukup!");
                
                setIsGenerating(true);
                setLoadingText(type === 'outline' ? 'Menyusun daftar isi...' : 'Menulis isi buku lengkap...');
                
                const systemMsg = `Anda adalah penulis buku profesional. Target: ${audience}. Gaya: ${tone}. Bahasa: Indonesia. Format: Markdown.`;
                const promptMsg = type === 'outline' 
                    ? `Buatkan kerangka bab yang sangat detail untuk buku: "${topic}".` 
                    : `Tuliskan isi buku lengkap dan mendalam tentang: "${topic}". Sertakan Pendahuluan, minimal 5 Bab isi, dan Penutup.`;

                try {
                    // MENGARAH KE BACKEND RENDER
                    const response = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            prompt: promptMsg,
                            system: systemMsg,
                            engine: aiEngine
                        })
                    });

                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error || 'Server AI tidak merespons.');

                    setGeneratedContent(marked.parse(data.text));

                    // Update Tokens
                    const updatedTokens = profile.tokens - cost;
                    await client.from('profiles').update({ tokens: updatedTokens }).eq('id', user.id);
                    setProfile(prev => ({ ...prev, tokens: updatedTokens }));
                    
                    setTimeout(() => { resultRef.current?.scrollIntoView({ behavior: 'smooth' }); }, 300);
                } catch (error) {
                    alert("Gagal Generate: " + error.message);
                }
                setIsGenerating(false);
            };

            const downloadTxt = () => {
                const text = document.getElementById('output-area').innerText;
                const blob = new Blob([text], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Draft-Buku-${topic.substring(0,15)}.txt`;
                a.click();
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4">
                        <div className="bg-white rounded-[2.5rem] p-10 w-full max-w-md shadow-2xl animate-fade-in border border-slate-100">
                            <div className="text-center mb-8">
                                <div className="bg-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center text-white mx-auto mb-4 shadow-lg shadow-indigo-200">
                                    <i data-lucide="book-open" className="w-8 h-8"></i>
                                </div>
                                <h1 className="text-3xl font-black text-slate-800">AutoBook Pro</h1>
                                <p className="text-slate-400 text-sm font-medium mt-1 uppercase tracking-widest">AI Writing Studio</p>
                            </div>
                            <form onSubmit={handleAuth} className="space-y-4">
                                <input type="email" required value={authEmail} onChange={e=>setAuthEmail(e.target.value)} className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-indigo-500 outline-none transition font-semibold" placeholder="Email Anda"/>
                                <input type="password" required value={authPassword} onChange={e=>setAuthPassword(e.target.value)} className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-indigo-500 outline-none transition font-semibold" placeholder="Kata Sandi"/>
                                <button type="submit" disabled={authLoading} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-indigo-100 transition active:scale-95 disabled:opacity-50">
                                    {authLoading ? 'SINKRONISASI...' : (isRegistering ? 'DAFTAR SEKARANG' : 'MASUK DASBOR')}
                                </button>
                            </form>
                            <div className="text-center mt-8">
                                <button onClick={() => setIsRegistering(!isRegistering)} className="text-indigo-600 font-bold hover:underline text-sm uppercase tracking-wider">
                                    {isRegistering ? 'Sudah punya akun? Masuk' : 'Belum punya akun? Daftar'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-md"><i data-lucide="zap" className="w-5 h-5"></i></div>
                            <h2 className="text-xl font-black text-slate-800 tracking-tight">Studio <span className="text-indigo-600">Pro</span></h2>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="bg-indigo-50 px-4 py-2 rounded-full border border-indigo-100 flex items-center gap-2">
                                <i data-lucide="database" className="w-4 h-4 text-indigo-600"></i>
                                <span className="font-black text-indigo-700 text-sm">{profile.tokens || 0}</span>
                            </div>
                            <button onClick={() => client.auth.signOut()} className="text-slate-300 hover:text-red-500 transition"><i data-lucide="log-out"></i></button>
                        </div>
                    </header>

                    <main className="max-w-7xl w-full mx-auto p-4 sm:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <div className="lg:col-span-4 space-y-6">
                            <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                                <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Aktivasi Kode</h3>
                                <div className="flex gap-2">
                                    <input type="text" value={voucherCode} onChange={e=>setVoucherCode(e.target.value)} placeholder="VOUCHER" className="flex-grow bg-slate-50 border-2 border-slate-100 p-3 rounded-xl text-sm font-black uppercase outline-none focus:border-indigo-400" />
                                    <button onClick={handleRedeem} className="bg-slate-800 text-white px-5 rounded-xl font-black text-xs hover:bg-slate-900 transition">KLAIM</button>
                                </div>
                            </div>

                            <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-6">
                                <div>
                                    <label className="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Topik Buku</label>
                                    <textarea value={topic} onChange={e=>setTopic(e.target.value)} rows="3" placeholder="Apa yang ingin Anda tulis hari ini?" className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-indigo-500 outline-none font-semibold text-sm transition"></textarea>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Target</label>
                                        <select value={audience} onChange={e=>setAudience(e.target.value)} className="w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-xl text-xs font-bold outline-none">
                                            <option>Pemula / Umum</option>
                                            <option>Menengah</option>
                                            <option>Ahli / Pro</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Gaya</label>
                                        <select value={tone} onChange={e=>setTone(e.target.value)} className="w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-xl text-xs font-bold outline-none">
                                            <option>Informatif & Santai</option>
                                            <option>Formal</option>
                                            <option>Inspiratif</option>
                                        </select>
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-xs font-black text-slate-400 uppercase tracking-widest mb-3">Pilih Mesin AI</label>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={()=>setAiEngine('gemini')} className={`py-3 rounded-xl font-black text-[10px] uppercase border-2 transition ${aiEngine === 'gemini' ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-slate-100 text-slate-400'}`}>Gemini Flash</button>
                                        <button onClick={()=>setAiEngine('openai')} className={`py-3 rounded-xl font-black text-[10px] uppercase border-2 transition ${aiEngine === 'openai' ? 'border-emerald-500 bg-emerald-50 text-emerald-700' : 'border-slate-100 text-slate-400'}`}>ChatGPT 4o</button>
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-3">
                                <button onClick={()=>callAI('outline', 5)} disabled={isGenerating} className="w-full bg-white border-2 border-indigo-600 text-indigo-600 font-black py-4 rounded-2xl hover:bg-indigo-50 transition flex items-center justify-center gap-2 disabled:opacity-50">
                                    <i data-lucide="layout"></i> BUAT DAFTAR ISI (5 TKN)
                                </button>
                                <button onClick={()=>callAI('full', 20)} disabled={isGenerating} className="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition flex items-center justify-center gap-2 disabled:opacity-50">
                                    <i data-lucide="pen-tool"></i> TULIS BUKU PENUH (20 TKN)
                                </button>
                            </div>
                        </div>

                        <div className="lg:col-span-8" ref={resultRef}>
                            <div className="bg-white rounded-[3rem] shadow-xl border border-slate-100 p-8 sm:p-16 min-h-[600px] flex flex-col relative overflow-hidden">
                                {isGenerating ? (
                                    <div className="flex-grow flex flex-col items-center justify-center text-indigo-600 animate-fade-in">
                                        <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-6"></div>
                                        <p className="font-black text-xl tracking-tight">{loadingText}</p>
                                        <p className="text-xs text-slate-400 mt-2 uppercase tracking-widest font-bold">Menggunakan {aiEngine.toUpperCase()} AI Engine</p>
                                    </div>
                                ) : generatedContent ? (
                                    <div className="animate-fade-in">
                                        <div className="flex justify-between items-center mb-10 pb-6 border-b border-slate-50">
                                            <span className="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em]">Draft Naskah AI</span>
                                            <button onClick={downloadTxt} className="text-indigo-600 hover:text-indigo-800 flex items-center gap-2 text-xs font-black uppercase tracking-widest">
                                                <i data-lucide="download" className="w-4 h-4"></i> Simpan File
                                            </button>
                                        </div>
                                        <div 
                                            id="output-area" 
                                            className="book-content prose max-w-none"
                                            dangerouslySetInnerHTML={{ __html: generatedContent }}
                                        ></div>
                                    </div>
                                ) : (
                                    <div className="flex-grow flex flex-col items-center justify-center text-slate-200">
                                        <i data-lucide="scroll-text" className="w-32 h-32 mb-6 opacity-20"></i>
                                        <h3 className="text-2xl font-black text-slate-300">Kertas Masih Kosong</h3>
                                        <p className="text-slate-400 font-medium">Tulis topik di samping dan biarkan AI bekerja.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                    <footer className="py-10 text-center text-slate-300 text-[10px] font-black uppercase tracking-[0.5em]">
                        © 2024 AUTOBOOK PRO CLOUD
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        setInterval(() => { if (window.lucide) window.lucide.createIcons(); }, 1000);
    </script>
</body>
</html>
