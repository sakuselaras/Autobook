<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Auto Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .tab-active { background-color: #10b981 !important; color: white !important; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- LOGIN OVERLAY -->
    <div id="admin-login-overlay" class="fixed inset-0 bg-slate-900 z-[999] flex items-center justify-center p-4">
        <div class="bg-white rounded-[3rem] p-10 w-full max-w-sm shadow-2xl text-center border border-emerald-100">
            <h1 class="text-2xl font-black mb-6">Admin Panel</h1>
            <input type="password" id="admin-pass" placeholder="Kata Laluan" class="w-full bg-slate-50 border p-4 rounded-2xl font-black text-center outline-none focus:border-emerald-500 mb-4">
            <button onclick="window.checkAdminLogin()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg">MASUK</button>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex shrink-0">
        <div class="p-8 border-b border-slate-800 text-center">
            <h1 class="text-xl font-black text-emerald-400 tracking-tight">Admin<span class="text-white">Cloud</span></h1>
        </div>
        <nav class="flex-grow p-4 space-y-2">
            <button id="nav-users" onclick="window.switchView('users')" class="text-slate-400 hover:text-white px-4 py-3 rounded-xl font-medium w-full text-left flex items-center gap-3 transition-all"><i class="fas fa-users w-5"></i> Pengguna</button>
            <button id="nav-voucher" onclick="window.switchView('voucher')" class="text-slate-400 hover:text-white px-4 py-3 rounded-xl font-medium w-full text-left flex items-center gap-3 transition-all"><i class="fas fa-ticket-alt w-5"></i> Voucher</button>
            <button id="nav-pakej" onclick="window.switchView('pakej')" class="text-slate-400 hover:text-white px-4 py-3 rounded-xl font-medium w-full text-left flex items-center gap-3 transition-all"><i class="fas fa-box-open w-5"></i> Pakej Harga</button>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <button onclick="window.logoutAdmin()" class="w-full text-slate-500 hover:text-red-400 text-xs font-bold uppercase tracking-widest py-2">Logout</button>
        </div>
    </aside>

    <!-- CONTENT -->
    <main class="flex-grow flex flex-col h-full overflow-hidden bg-slate-50">
        <header class="bg-white border-b px-8 py-6 flex justify-between items-center shadow-sm">
            <h2 id="header-title" class="text-2xl font-black text-slate-800 uppercase tracking-tight">Pusat Kawalan</h2>
            <div class="bg-emerald-50 text-emerald-600 px-4 py-2 rounded-full text-[10px] font-black border border-emerald-100 uppercase tracking-widest">Connected</div>
        </header>

        <div class="flex-grow overflow-y-auto p-8 custom-scrollbar">
            <!-- VIEW: USERS -->
            <div id="users-view" class="space-y-6">
                <div class="bg-white rounded-[2rem] border shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-[10px] font-black uppercase border-b text-slate-400 tracking-widest">
                            <tr><th class="px-8 py-5">E-mel User</th><th class="px-8 py-5 text-center">Baki Token</th><th class="px-8 py-5 text-right">Tindakan</th></tr>
                        </thead>
                        <tbody id="user-table-body" class="text-sm"></tbody>
                    </table>
                </div>
            </div>

            <!-- VIEW: VOUCHER -->
            <div id="voucher-view" class="hidden space-y-8">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-1 bg-white p-8 rounded-[2.5rem] border shadow-sm h-fit space-y-6">
                        <h3 class="font-black text-slate-800 border-b pb-4 italic">Bina Voucher</h3>
                        <div class="space-y-4">
                            <input type="text" id="in-code" placeholder="KOD (Cth: TOPUP200)" class="w-full bg-slate-50 border p-4 rounded-xl font-black uppercase outline-none focus:border-emerald-500">
                            <input type="number" id="in-amount" placeholder="Jumlah Token" class="w-full bg-slate-50 border p-4 rounded-xl font-bold outline-none focus:border-emerald-500">
                            <button onclick="window.saveVoucher()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-black shadow-lg hover:bg-emerald-700 transition-all uppercase text-xs">Aktifkan</button>
                        </div>
                    </div>
                    <div class="lg:col-span-2 space-y-4" id="voucher-list"></div>
                </div>
            </div>

            <!-- VIEW: PAKEJ -->
            <div id="pakej-view" class="hidden space-y-8">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-1 bg-white p-8 rounded-[2.5rem] border shadow-sm h-fit space-y-6 sticky top-0">
                        <h3 class="font-black text-slate-800 border-b pb-4 italic uppercase">Tetapan Pakej</h3>
                        <div class="space-y-4">
                            <input type="text" id="p-name" placeholder="Nama (Cth: Paket Basic)" class="w-full border p-4 rounded-xl font-bold outline-none">
                            <input type="number" id="p-token" placeholder="Jumlah Token" class="w-full border p-4 rounded-xl font-black outline-none">
                            <input type="text" id="p-price" placeholder="Harga (Cth: Rp 50.000)" class="w-full border p-4 rounded-xl font-bold outline-none">
                            <button onclick="window.savePackage()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black shadow-lg uppercase text-xs">Simpan</button>
                        </div>
                    </div>
                    <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4" id="pakej-list"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- KONFIGURASI SUPABASE ---
        const SUPABASE_URL = ""; 
        const SUPABASE_KEY = "";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ADMIN_PASS = "admin123";

        window.checkAdminLogin = () => {
            if (document.getElementById('admin-pass').value === ADMIN_PASS) {
                document.getElementById('admin-login-overlay').classList.add('hidden');
                localStorage.setItem('supabase_admin_session', 'active');
                init();
            } else { alert("Kata Laluan Salah!"); }
        };

        if (localStorage.getItem('supabase_admin_session') === 'active') {
            document.getElementById('admin-login-overlay').classList.add('hidden');
            init();
        }

        function init() {
            loadUsers();
            loadVouchers();
            loadPackages();
            window.switchView('users');
        }

        window.switchView = (v) => {
            ['users', 'voucher', 'pakej'].forEach(id => {
                document.getElementById(`${id}-view`).classList.add('hidden');
                document.getElementById(`nav-${id}`).classList.remove('tab-active');
            });
            document.getElementById(`${v}-view`).classList.remove('hidden');
            document.getElementById(`nav-${v}`).classList.add('tab-active');
        };

        async function loadUsers() {
            const { data } = await supabaseClient.from('profiles').select('*').order('email');
            const tb = document.getElementById('user-table-body');
            tb.innerHTML = '';
            data?.forEach(u => {
                tb.innerHTML += `<tr class="border-b"><td class="px-8 py-5 font-bold">${u.email}</td><td class="px-8 py-5 text-center"><span class="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-lg font-black text-xs border">${u.tokens}</span></td><td class="px-8 py-5 text-right"><button onclick="window.deleteUser('${u.id}')" class="text-red-500"><i class="fas fa-trash-alt"></i></button></td></tr>`;
            });
        }

        async function loadVouchers() {
            const { data } = await supabaseClient.from('vouchers').select('*').order('code');
            const list = document.getElementById('voucher-list');
            list.innerHTML = '';
            data?.forEach(v => {
                const used = v.usage_count >= v.max_usage;
                list.innerHTML += `<div class="bg-white p-6 rounded-[2rem] border flex justify-between items-center shadow-sm"><div><p class="font-black text-slate-800 text-lg uppercase tracking-tighter">${v.code}</p><p class="text-[9px] font-bold text-slate-300 uppercase">${v.usage_count}/${v.max_usage} Digunakan</p></div><div class="flex items-center gap-4"><span class="${used ? 'bg-slate-100 text-slate-300' : 'bg-emerald-50 text-emerald-600'} px-4 py-2 rounded-xl font-black text-xs border"> ${used ? 'HABIS' : '+' + v.amount + ' TOKENS'}</span><button onclick="window.deleteVoucher('${v.code}')" class="text-slate-300 hover:text-red-500 transition-colors p-2"><i class="fas fa-trash-alt"></i></button></div></div>`;
            });
        }

        window.saveVoucher = async () => {
            const code = document.getElementById('in-code').value.trim().toUpperCase();
            const amount = parseInt(document.getElementById('in-amount').value);
            if(!code || isNaN(amount)) return alert("Data tidak lengkap!");
            const { error } = await supabaseClient.from('vouchers').insert([{ code, amount, max_usage: 1 }]);
            if(!error) { alert("Baucar berjaya!"); loadVouchers(); } else { alert(error.message); }
        };

        window.deleteVoucher = async (c) => { if(confirm("Hapus?")) { await supabaseClient.from('vouchers').delete().eq('code', c); loadVouchers(); }};

        async function loadPackages() {
            const { data } = await supabaseClient.from('packages').select('*').order('id');
            const list = document.getElementById('pakej-list');
            list.innerHTML = '';
            data?.forEach(p => {
                list.innerHTML += `<div class="bg-white p-8 rounded-[3rem] border-2 border-slate-50 shadow-sm space-y-4 text-center"><div><h4 class="font-black text-slate-800 uppercase text-xs tracking-widest italic">${p.name}</h4><p class="text-3xl font-black text-blue-600 my-2">${p.price}</p><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">+${p.token_amount} TOKENS</p></div><button onclick="window.deletePackage(${p.id})" class="w-full bg-red-50 text-red-500 py-3 rounded-2xl text-[10px] font-black uppercase hover:bg-red-500 hover:text-white transition-all">Hapus Pakej</button></div>`;
            });
        }

        window.savePackage = async () => {
            const name = document.getElementById('p-name').value;
            const tokens = parseInt(document.getElementById('p-token').value);
            const price = document.getElementById('p-price').value;
            if(!name || !tokens || !price) return alert("Sila isi data pakej!");
            const { error } = await supabaseClient.from('packages').insert([{ name, token_amount: tokens, price }]);
            if(!error) { alert("Pakej berjaya!"); loadPackages(); }
        };

        window.deletePackage = async (id) => { if(confirm("Hapus?")) { await supabaseClient.from('packages').delete().eq('id', id); loadPackages(); }};
        window.logoutAdmin = () => { localStorage.removeItem('supabase_admin_session'); location.reload(); };
    </script>
</body>
</html>
