<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Auto Book Cloud</title>
    <!-- Framework & UI Library -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; }
        .tab-active { background-color: #10b981 !important; color: white !important; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- LAYAR LOGIN ADMIN -->
    <div id="admin-login-overlay" class="fixed inset-0 bg-slate-900 z-[999] flex items-center justify-center p-4 transition-opacity duration-300">
        <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-sm shadow-2xl text-center border border-emerald-100 relative">
            <!-- Indikator Loading Sistem -->
            <div id="system-loading" class="absolute inset-0 bg-white/90 rounded-[2.5rem] flex flex-col items-center justify-center z-10">
                <div class="w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-2"></div>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Menyiapkan Sistem...</p>
            </div>

            <h1 class="text-2xl font-black mb-6 text-slate-800">Panel Admin</h1>
            <input type="password" id="admin-pass" placeholder="Kata Sandi Admin" class="w-full bg-slate-50 border p-4 rounded-2xl font-black text-center outline-none focus:border-emerald-500 mb-4 shadow-inner" onkeypress="if(event.key === 'Enter') window.checkAdminLogin()">
            <button onclick="window.checkAdminLogin()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl font-black shadow-lg uppercase text-xs tracking-widest transition-colors active:scale-95">MASUK DASBOR</button>
        </div>
    </div>

    <!-- BILAH SAMPING (SIDEBAR) -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex shrink-0 shadow-2xl z-40">
        <div class="p-8 border-b border-slate-800">
            <h1 class="text-xl font-black text-emerald-400">Admin Cloud</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Supabase Engine</p>
        </div>
        <nav class="flex-grow p-4 space-y-2">
            <button id="nav-users" onclick="window.switchView('users')" class="text-slate-400 hover:text-white px-4 py-3 rounded-xl font-medium w-full text-left flex items-center gap-3 transition-all tab-active">
                <i class="fas fa-users w-5"></i> Data Pengguna
            </button>
            <button id="nav-voucher" onclick="window.switchView('voucher')" class="text-slate-400 hover:text-white px-4 py-3 rounded-xl font-medium w-full text-left flex items-center gap-3 transition-all">
                <i class="fas fa-ticket-alt w-5"></i> Kelola Voucher
            </button>
            <button id="nav-paket" onclick="window.switchView('paket')" class="text-slate-400 hover:text-white px-4 py-3 rounded-xl font-medium w-full text-left flex items-center gap-3 transition-all">
                <i class="fas fa-box-open w-5"></i> Kelola Paket
            </button>
        </nav>
        <div class="p-4 border-t border-slate-800 text-center">
            <button onclick="window.logoutAdmin()" class="text-slate-500 hover:text-red-400 text-xs font-bold uppercase tracking-widest transition-colors">Keluar</button>
        </div>
    </aside>

    <!-- KONTEN UTAMA -->
    <main class="flex-grow flex flex-col overflow-hidden relative">
        <header class="bg-white border-b px-8 py-5 flex justify-between items-center shadow-sm z-30">
            <h2 id="header-title" class="text-2xl font-black text-slate-800">Dasbor Utama</h2>
            <div class="bg-emerald-50 text-emerald-600 px-4 py-1.5 rounded-full text-[10px] font-black border border-emerald-100 uppercase tracking-widest flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                Sinkronisasi Aktif
            </div>
        </header>

        <div class="flex-grow overflow-y-auto p-8 bg-slate-50 custom-scrollbar">
            
            <!-- TAMPILAN: DATA PENGGUNA -->
            <div id="users-view" class="space-y-6 animate-fade-in">
                <div class="bg-white rounded-[2rem] border shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-[10px] font-black uppercase border-b text-slate-400 tracking-widest">
                            <tr>
                                <th class="px-8 py-5">Email Pengguna</th>
                                <th class="px-8 py-5 text-center">Saldo Kredit</th>
                                <th class="px-8 py-5 text-right">ID Unik (UID)</th>
                            </tr>
                        </thead>
                        <tbody id="user-table-body" class="text-sm">
                            <tr><td colspan="3" class="text-center py-10 text-slate-400 text-xs font-bold uppercase tracking-widest">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- TAMPILAN: KELOLA VOUCHER -->
            <div id="voucher-view" class="hidden space-y-8 animate-fade-in">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-1 bg-white p-8 rounded-[2rem] border shadow-sm h-fit space-y-6">
                        <h3 class="font-black text-slate-800 border-b pb-4">Buat Voucher Baru</h3>
                        <div class="space-y-4">
                            <input type="text" id="in-code" placeholder="KODE VOUCHER (Cth: PROMO50)" class="w-full bg-slate-50 border p-4 rounded-xl font-black uppercase text-sm outline-none focus:border-emerald-500 transition-colors">
                            <input type="number" id="in-amount" placeholder="Jumlah Token" class="w-full bg-slate-50 border p-4 rounded-xl font-bold text-sm outline-none focus:border-emerald-500 transition-colors">
                            <button onclick="window.saveVoucher()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-xl font-black shadow-lg transition-colors active:scale-95">AKTIFKAN KODE</button>
                        </div>
                    </div>
                    <div class="lg:col-span-2 space-y-4" id="voucher-list">
                        <div class="text-center py-10 text-slate-400 text-xs font-bold uppercase tracking-widest">Memuat data voucher...</div>
                    </div>
                </div>
            </div>

            <!-- TAMPILAN: KELOLA PAKET -->
            <div id="paket-view" class="hidden space-y-8 animate-fade-in">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-1 bg-white p-8 rounded-[2rem] border shadow-sm h-fit space-y-6">
                        <h3 class="font-black text-slate-800 border-b pb-4">Tambah/Ubah Paket</h3>
                        <div class="space-y-4">
                            <input type="text" id="p-name" placeholder="Nama Paket (Cth: Paket Pro)" class="w-full bg-slate-50 border p-4 rounded-xl font-bold outline-none focus:border-emerald-500">
                            <input type="number" id="p-token" placeholder="Jumlah Token" class="w-full bg-slate-50 border p-4 rounded-xl font-black outline-none focus:border-emerald-500">
                            <input type="text" id="p-price" placeholder="Harga (Cth: Rp 50.000)" class="w-full bg-slate-50 border p-4 rounded-xl font-bold outline-none focus:border-emerald-500">
                            <button onclick="window.savePackage()" class="w-full bg-slate-800 hover:bg-slate-900 text-white py-4 rounded-xl font-black shadow-lg transition-colors active:scale-95">SIMPAN DATA</button>
                        </div>
                    </div>
                    <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4" id="paket-list">
                        <div class="col-span-full text-center py-10 text-slate-400 text-xs font-bold uppercase tracking-widest">Memuat data paket...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- KONFIGURASI SUPABASE ---
        const SUPABASE_URL = "https://pgefqhpomzjbqbqobkta.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_YO3yI5L3PSXl2X9VXhwRcQ_OID1tZdo"; // Key terbaru yang valid
        let supabaseClient;

        const ADMIN_PASS = "admin123";

        // Fungsi inisialisasi yang aman (menunggu library termuat)
        function initSupabase() {
            if (window.supabase) {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                
                // Sembunyikan indikator loading
                document.getElementById('system-loading').classList.add('hidden');

                // Cek apakah admin sudah pernah login sebelumnya
                if(localStorage.getItem('supabase_admin_session') === 'active') {
                    document.getElementById('admin-login-overlay').classList.add('hidden');
                    initDashboard();
                }
            } else {
                // Ulangi pencarian jika library Supabase CDN belum selesai diunduh
                setTimeout(initSupabase, 100);
            }
        }

        // Mulai inisialisasi
        initSupabase();

        // Fungsi Login Admin
        window.checkAdminLogin = () => {
            if (!supabaseClient) {
                alert("Sistem sedang disiapkan, mohon tunggu sebentar.");
                return;
            }
            
            const passInput = document.getElementById('admin-pass').value;
            if(passInput === ADMIN_PASS) {
                document.getElementById('admin-login-overlay').classList.add('hidden');
                localStorage.setItem('supabase_admin_session', 'active');
                initDashboard();
            } else { 
                alert("Kata sandi yang Anda masukkan salah!"); 
            }
        };

        // Fungsi Logout Admin
        window.logoutAdmin = () => { 
            localStorage.removeItem('supabase_admin_session'); 
            location.reload(); 
        };

        // Memuat semua data ketika berhasil masuk
        function initDashboard() { 
            loadUsers(); 
            loadVouchers(); 
            loadPackages(); 
            window.switchView('users'); 
        }

        // Ganti Tampilan Tab (Menu)
        window.switchView = (v) => {
            ['users', 'voucher', 'paket'].forEach(id => {
                document.getElementById(`${id}-view`).classList.add('hidden');
                document.getElementById(`nav-${id}`).classList.remove('tab-active');
            });
            document.getElementById(`${v}-view`).classList.remove('hidden');
            document.getElementById(`nav-${v}`).classList.add('tab-active');
            
            // Ubah judul header sesuai tab
            const titles = { 'users': 'Data Pengguna', 'voucher': 'Kelola Voucher', 'paket': 'Kelola Paket' };
            document.getElementById('header-title').innerText = titles[v];
        };

        // --- FUNGSI CRUD DATABASE ---

        // 1. Muat Pengguna
        async function loadUsers() {
            try {
                const { data, error } = await supabaseClient.from('profiles').select('*');
                if (error) throw error;
                
                const tbody = document.getElementById('user-table-body');
                tbody.innerHTML = '';
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="text-center py-10 text-slate-400 text-xs font-bold uppercase tracking-widest">Belum ada pengguna terdaftar</td></tr>';
                    return;
                }

                data.forEach(u => {
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-slate-50 transition-colors">
                            <td class="px-8 py-5 font-bold text-slate-700">${u.email || 'Tanpa Email'}</td>
                            <td class="px-8 py-5 text-center">
                                <span class="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-lg font-black text-xs border border-emerald-100">${u.tokens}</span>
                            </td>
                            <td class="px-8 py-5 text-right font-mono text-[10px] text-slate-300">${u.id}</td>
                        </tr>`;
                });
            } catch (err) {
                console.error("Gagal memuat pengguna:", err);
            }
        }

        // 2. Muat Voucher
        async function loadVouchers() {
            try {
                const { data, error } = await supabaseClient.from('vouchers').select('*').order('code');
                if (error) throw error;

                const list = document.getElementById('voucher-list');
                list.innerHTML = '';
                
                if (!data || data.length === 0) {
                    list.innerHTML = '<div class="text-center py-10 text-slate-400 text-xs font-bold uppercase tracking-widest border-2 border-dashed rounded-[2rem]">Belum ada voucher</div>';
                    return;
                }

                data.forEach(v => {
                    const isLimit = v.usage_count >= v.max_usage;
                    list.innerHTML += `
                        <div class="bg-white p-6 rounded-2xl border flex justify-between items-center shadow-sm hover:shadow-md transition-shadow">
                            <div>
                                <p class="font-black text-slate-800 text-lg uppercase tracking-tight">${v.code}</p>
                                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">${v.usage_count} dari ${v.max_usage} Digunakan</p>
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="${isLimit ? 'bg-slate-100 text-slate-400 border-slate-200' : 'bg-emerald-50 text-emerald-600 border-emerald-100'} px-4 py-2 rounded-xl font-black text-xs border">+${v.amount} Token</span>
                                <button onclick="window.deleteVoucher('${v.code}')" class="text-slate-300 hover:text-red-500 transition-colors p-2" title="Hapus Voucher">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </div>`;
                });
            } catch (err) {
                console.error("Gagal memuat voucher:", err);
            }
        }

        // Simpan Voucher
        window.saveVoucher = async () => {
            const code = document.getElementById('in-code').value.trim().toUpperCase();
            const amount = parseInt(document.getElementById('in-amount').value);
            
            if(!code || isNaN(amount)) return alert("Silakan lengkapi kode dan jumlah token!");
            
            try {
                const { error } = await supabaseClient.from('vouchers').insert([{ code, amount }]);
                if (error) {
                    if(error.code === '23505') alert("Kode voucher ini sudah ada!");
                    else throw error;
                } else {
                    alert("Voucher berhasil ditambahkan!"); 
                    document.getElementById('in-code').value = '';
                    document.getElementById('in-amount').value = '';
                    loadVouchers();
                }
            } catch (err) {
                alert("Kesalahan: " + err.message);
            }
        };

        // Hapus Voucher
        window.deleteVoucher = async (code) => { 
            if(confirm("Apakah Anda yakin ingin menghapus voucher ini?")) { 
                await supabaseClient.from('vouchers').delete().eq('code', code); 
                loadVouchers(); 
            }
        };

        // 3. Muat Paket
        async function loadPackages() {
            try {
                const { data, error } = await supabaseClient.from('packages').select('*').order('id');
                if (error) throw error;

                const list = document.getElementById('paket-list');
                list.innerHTML = '';

                if (!data || data.length === 0) {
                    list.innerHTML = '<div class="col-span-full text-center py-10 text-slate-400 text-xs font-bold uppercase tracking-widest border-2 border-dashed rounded-[2rem]">Belum ada paket</div>';
                    return;
                }

                data.forEach(p => {
                    list.innerHTML += `
                        <div class="bg-white p-8 rounded-[2.5rem] border shadow-sm text-center hover:border-emerald-400 transition-colors relative group">
                            <div>
                                <h4 class="font-black text-slate-800 uppercase text-xs tracking-widest">${p.name}</h4>
                                <p class="text-2xl font-black text-emerald-600 my-2 tracking-tighter">${p.price}</p>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">+${p.token_amount} Token</p>
                            </div>
                            <button onclick="window.deletePackage(${p.id})" class="w-full bg-red-50 text-red-500 hover:bg-red-500 hover:text-white py-3 rounded-xl text-[10px] font-black uppercase mt-6 transition-colors tracking-widest">
                                Hapus Paket
                            </button>
                        </div>`;
                });
            } catch (err) {
                console.error("Gagal memuat paket:", err);
            }
        }

        // Simpan Paket
        window.savePackage = async () => {
            const name = document.getElementById('p-name').value;
            const token_amount = parseInt(document.getElementById('p-token').value);
            const price = document.getElementById('p-price').value;
            
            if(!name || isNaN(token_amount) || !price) return alert("Silakan isi semua data dengan benar!");
            
            try {
                const { error } = await supabaseClient.from('packages').insert([{ name, token_amount, price }]);
                if (error) throw error;
                
                alert("Paket berhasil disimpan!"); 
                document.getElementById('p-name').value = '';
                document.getElementById('p-token').value = '';
                document.getElementById('p-price').value = '';
                loadPackages();
            } catch (err) {
                alert("Kesalahan: " + err.message);
            }
        };

        // Hapus Paket
        window.deletePackage = async (id) => { 
            if(confirm("Apakah Anda yakin ingin menghapus paket ini?")) { 
                await supabaseClient.from('packages').delete().eq('id', id); 
                loadPackages(); 
            }
        };
    </script>
</body>
</html>
