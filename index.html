<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Book Creator - Premium Cloud Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .page-paper { background: white; width: 210mm; min-height: 297mm; margin: 0 auto; padding: 25.4mm; box-shadow: 0 10px 40px rgba(0,0,0,0.1); box-sizing: border-box; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden bg-slate-50">

    <!-- PAPARAN LOG MASUK -->
    <div id="auth-overlay" class="fixed inset-0 bg-slate-900/95 backdrop-blur-md z-[300] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-md shadow-2xl text-center border border-emerald-100">
            <div class="w-20 h-20 bg-emerald-600 rounded-3xl mx-auto flex items-center justify-center text-white text-3xl mb-6 shadow-lg transform -rotate-6">
                <i class="fas fa-book-open"></i>
            </div>
            <h1 class="text-2xl font-black text-slate-800 mb-2">Auto Book Creator</h1>
            <p class="text-xs text-slate-500 mb-8 font-medium italic">Wujudkan e-book impian anda secara dalam talian.</p>
            <div class="space-y-4 text-left">
                <input type="email" id="auth-email" placeholder="E-mel" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 font-medium text-sm">
                <input type="password" id="auth-password" placeholder="Kata Laluan (min. 6 aksara)" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 font-medium text-sm">
                <div class="grid grid-cols-2 gap-4 pt-4">
                    <button onclick="window.loginUser()" class="bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl font-bold transition-all">LOG MASUK</button>
                    <button onclick="window.registerUser()" class="bg-slate-800 hover:bg-slate-900 text-white py-4 rounded-2xl font-bold transition-all">DAFTAR</button>
                </div>
            </div>
        </div>
    </div>

    <!-- KEPALA HALAMAN -->
    <header class="bg-white border-b px-8 py-4 flex justify-between items-center shadow-sm z-50">
        <h1 class="font-black text-emerald-600 text-xl tracking-tighter">Auto Book <span class="bg-emerald-100 text-emerald-700 text-[10px] px-2 py-1 rounded-md ml-1 font-bold uppercase tracking-widest">v8.7 Online</span></h1>
        <div class="flex items-center gap-6">
            <div class="flex flex-col items-end">
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Baki Kredit</span>
                <div class="flex items-center gap-2 text-emerald-600 font-black">
                    <i class="fas fa-gem text-xs"></i><span id="credit-count" class="text-lg">0</span>
                </div>
            </div>
            <button onclick="window.logoutUser()" class="text-slate-400 hover:text-red-500 font-bold text-xs transition-colors uppercase tracking-widest">Log Keluar <i class="fas fa-sign-out-alt ml-1"></i></button>
        </div>
    </header>

    <!-- RUANG KERJA -->
    <main class="flex-grow flex overflow-hidden">
        <div class="w-full lg:w-1/2 overflow-y-auto p-12 border-r bg-white space-y-12 custom-scrollbar">
            
            <!-- BAHAGIAN TOP UP -->
            <div class="bg-slate-50 p-8 rounded-[2rem] border border-slate-100 space-y-4">
                <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest flex items-center gap-2">
                    <i class="fas fa-plus-circle text-emerald-500"></i> Tambah Nilai Kredit
                </h3>
                <div class="flex gap-2">
                    <input type="text" id="voucher-input" placeholder="Masukkan Kod Baucar" class="flex-grow border-2 border-white bg-white p-4 rounded-xl outline-none focus:border-emerald-500 font-black uppercase text-xs shadow-sm">
                    <button onclick="window.redeemVoucher()" id="btn-redeem" class="bg-slate-800 text-white px-6 rounded-xl font-black text-[10px] uppercase hover:bg-black transition-all">Guna</button>
                </div>
            </div>

            <!-- BAHAGIAN PENJANA -->
            <div id="panel-1" class="space-y-8 animate-fade-in">
                <h2 class="text-3xl font-black text-slate-800 tracking-tight leading-tight">Apakah topik buku <br>yang ingin anda bina?</h2>
                <textarea id="in-niche" rows="5" class="w-full bg-slate-50 border-2 border-slate-100 p-6 rounded-[2rem] outline-none focus:border-emerald-500 transition-all font-medium text-base shadow-inner" placeholder="Contoh: Panduan berjaya jualan dalam talian untuk pemula..."></textarea>
                <button onclick="window.generateStep1()" id="btn-1" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white p-6 rounded-[2rem] font-black text-lg shadow-xl shadow-emerald-100 transition-all flex items-center justify-center gap-3">
                    <i class="fas fa-wand-sparkles"></i> JANA KONSEP UTAMA
                </button>
                
                <div id="res-1" class="hidden space-y-6 pt-10 border-t border-slate-100 animate-fade-in">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Tajuk E-Book Hasil AI</label>
                        <input type="text" id="edit-title" class="w-full border-2 border-slate-200 p-5 rounded-2xl font-bold text-slate-800 outline-none focus:border-emerald-500 shadow-sm transition-all">
                    </div>
                    <button onclick="window.lockStep(1, 2)" class="w-full bg-slate-800 hover:bg-black text-white p-6 rounded-2xl font-black shadow-lg transition-all flex items-center justify-center gap-3">
                        SIMPAN & TERUSKAN <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Kawasan Pratonton -->
        <div class="hidden lg:flex w-1/2 bg-slate-100 overflow-auto p-12 justify-center custom-scrollbar">
            <div id="master-preview" class="page-paper flex flex-col">
                <div id="prev-content" class="text-slate-800 flex-grow">
                    <div class="flex flex-col items-center justify-center h-full opacity-10 py-60">
                        <i class="fas fa-book-open text-8xl mb-6"></i>
                        <p class="font-black uppercase tracking-[0.5em] text-xs">Kawasan Pratonton</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Firebase - Pastikan Tiada Ruang Kosong
        const firebaseConfig = {
            apiKey: "AIzaSyD02K_dydVWWwry3Q8BSP7JuP9WyEj0mE8",
            authDomain: "autobook-creator.firebaseapp.com",
            projectId: "autobook-creator",
            storageBucket: "autobook-creator.firebasestorage.app",
            messagingSenderId: "720531474052",
            appId: "1:720531474052:web:63ef2e0fb0e14ef92f64d1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'autobook-creator-prod';

        window.currentUser = null;
        window.userCredits = 0;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                document.getElementById('auth-overlay').classList.add('hidden');
                
                // Pantau Profil & Kredit secara langsung
                onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data'), (snap) => {
                    if (snap.exists()) {
                        window.userCredits = snap.data().freeCredits || 0;
                        document.getElementById('credit-count').innerText = window.userCredits.toLocaleString('ms-MY');
                    }
                }, (err) => console.error("Ralat Firestore:", err));
            } else {
                window.currentUser = null;
                document.getElementById('auth-overlay').classList.remove('hidden');
            }
        });

        // Logika Penebusan Baucar (Akumulatif)
        window.redeemVoucher = async () => {
            const codeInput = document.getElementById('voucher-input');
            const code = codeInput.value.trim().toUpperCase();
            if(!code || !window.currentUser) return alert("Sila masukkan kod baucar!");

            const btn = document.getElementById('btn-redeem');
            btn.disabled = true; btn.innerText = "...";

            try {
                const vRef = doc(db, 'artifacts', appId, 'public', 'data', 'vouchers', code);
                const vSnap = await getDoc(vRef);

                if (vSnap.exists()) {
                    const vData = vSnap.data();
                    if ((vData.usageCount || 0) >= (vData.maxUsage || 1)) {
                        alert("Maaf, baucar ini telah habis kuota.");
                    } else {
                        const bakiLama = window.userCredits;
                        const jumlahBaucar = vData.amount;
                        const jumlahBaru = bakiLama + jumlahBaucar;

                        const userRef = doc(db, 'artifacts', appId, 'users', window.currentUser.uid, 'profile', 'data');
                        await updateDoc(userRef, { freeCredits: jumlahBaru });

                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', window.currentUser.uid), {
                            email: window.currentUser.email,
                            freeCredits: jumlahBaru,
                            lastActive: new Date().toISOString()
                        }, { merge: true });

                        await updateDoc(vRef, { usageCount: (vData.usageCount || 0) + 1 });

                        alert(`Berjaya! Baki anda bertambah ${jumlahBaucar}. Jumlah keseluruhan: ${jumlahBaru}`);
                        codeInput.value = "";
                    }
                } else {
                    alert("Kod Baucar tidak dijumpai.");
                }
            } catch (e) { alert("Ralat sistem berlaku."); }
            btn.disabled = false; btn.innerText = "Guna";
        };

        window.loginUser = async () => {
            const email = document.getElementById('auth-email').value;
            const pwd = document.getElementById('auth-password').value;
            try { await signInWithEmailAndPassword(auth, email, pwd); } catch (err) { alert("Log Masuk Gagal!"); }
        };

        window.registerUser = async () => {
            const email = document.getElementById('auth-email').value;
            const pwd = document.getElementById('auth-password').value;
            try {
                const res = await createUserWithEmailAndPassword(auth, email, pwd);
                const dataAwal = { email, freeCredits: 200, status: 'active', createdAt: new Date().toISOString() };
                await setDoc(doc(db, 'artifacts', appId, 'users', res.user.uid, 'profile', 'data'), dataAwal);
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', res.user.uid), dataAwal);
                alert("Pendaftaran Berjaya! Anda mendapat bonus 200 Kredit.");
            } catch (err) { alert(err.message); }
        };

        window.logoutUser = () => signOut(auth);

        async function fetchAI(prompt, system, schema) {
            const res = await fetch('/api/gemini', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ prompt, system, schema }) 
            });
            return await res.json();
        }

        window.generateStep1 = async () => {
            if (window.userCredits < 5) return alert("Kredit tidak mencukupi. Sila tambah nilai.");
            const niche = document.getElementById('in-niche').value;
            if(!niche) return alert("Sila isi topik!");
            const btn = document.getElementById('btn-1');
            btn.disabled = true; btn.innerText = "AI sedang menjana...";
            const res = await fetchAI(`Buatkan tajuk buku premium tentang ${niche}`, "Penulis Profesional", { type: "OBJECT", properties: { title: { type: "STRING" } }, required: ["title"] });
            
            document.getElementById('edit-title').value = res.title;
            document.getElementById('res-1').classList.remove('hidden');
            document.getElementById('prev-content').innerHTML = `<h1 style="text-align:center; font-size: 28pt; color: #2d5a27; padding-top: 100px; font-weight: 800; text-transform: uppercase;">${res.title}</h1>`;
            
            const userRef = doc(db, 'artifacts', appId, 'users', window.currentUser.uid, 'profile', 'data');
            await updateDoc(userRef, { freeCredits: window.userCredits - 5 });
            
            btn.disabled = false; btn.innerText = "JANA KONSEP UTAMA";
        };

        window.lockStep = (c, n) => alert("Konsep Disimpan!");
    </script>
</body>
</html>
